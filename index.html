<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kesir Ödevi - İnteraktif Kontrol</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            touch-action: none;
        }

        .container {
            background: #34495e;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 85%;
            max-width: 400px;
        }

        .display-area {
            font-size: 3rem;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .line {
            width: 100px;
            height: 4px;
            background: white;
            margin: 5px 0;
        }

        canvas {
            background: white;
            border-radius: 50%;
            margin-top: 20px;
            border: 5px solid #1abc9c;
        }

        .hint {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #bdc3c7;
        }

        /* Mobil Butonlar */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #1abc9c;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
        }

        button:active { background: #16a085; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kesir Kaşifi</h2>
    
    <div class="display-area">
        <div id="disp-pay">1</div>
        <div class="line"></div>
        <div id="disp-payda">4</div>
    </div>

    <canvas id="pieCanvas" width="180" height="180"></canvas>

    <div class="controls">
        <div class="btn-group">
            <small>PAY (↑ / ↓)</small>
            <button onclick="changePay(1)">+</button>
            <button onclick="changePay(-1)">-</button>
        </div>
        <div class="btn-group">
            <small>PAYDA (→ / ←)</small>
            <button onclick="changePayda(1)">+</button>
            <button onclick="changePayda(-1)">-</button>
        </div>
    </div>

    <div class="hint">
        Klavyede <b>Ok Tuşlarını</b> kullanabilirsin.
    </div>
</div>

<script>
    let pay = 1;
    let payda = 4;

    const canvas = document.getElementById('pieCanvas');
    const ctx = canvas.getContext('2d');

    // Klavye Kontrolü (Ok Tuşları)
    window.addEventListener('keydown', (e) => {
        if (e.key === "ArrowUp") changePay(1);
        if (e.key === "ArrowDown") changePay(-1);
        if (e.key === "ArrowRight") changePayda(1);
        if (e.key === "ArrowLeft") changePayda(-1);
    });

    function changePay(val) {
        pay += val;
        if (pay < 0) pay = 0;
        if (pay > payda) pay = payda; // Basit kesir ödevi için pay paydayı geçmesin
        update();
    }

    function changePayda(val) {
        payda += val;
        if (payda < 1) payda = 1;
        if (pay > payda) pay = payda;
        update();
    }

    function update() {
        document.getElementById('disp-pay').innerText = pay;
        document.getElementById('disp-payda').innerText = payda;
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const r = 75;

        // Arka Plan Daire
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = "#ecf0f1";
        ctx.fill();

        // Kesir Dilimi
        const angle = (pay / payda) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, -Math.PI / 2, (-Math.PI / 2) + angle);
        ctx.fillStyle = "#1abc9c";
        ctx.fill();
        ctx.lineTo(cx, cy);

        // Dilim Çizgileri
        for (let i = 0; i < payda; i++) {
            const lineAngle = (-Math.PI / 2) + (i * Math.PI * 2 / payda);
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + r * Math.cos(lineAngle), cy + r * Math.sin(lineAngle));
            ctx.strokeStyle = "#34495e";
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    }

    // Başlangıç çizimi
    update();
</script>

</body>
</html>
