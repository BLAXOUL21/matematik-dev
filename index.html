<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kesir Pizza & Pasta Oyunu</title>
<style>
  body { margin:0; background:#1b1b1b; color:white; text-align:center; font-family:Arial; }
  canvas { display:block; margin:20px auto; background:#2b2b2b; border-radius:12px; }
  button { padding:10px 15px; margin:5px; cursor:pointer; }
  #menu { position:absolute; top:0; left:0; width:100%; height:100%; background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #gameUI { display:none; }
</style>
</head>
<body>

<div id="menu">
  <h1>🍕🎂 Kesir Oyunu</h1>
  <button onclick="startGame('pizza')">Pizza Modu 🍕</button>
  <button onclick="startGame('cake')">Pasta Modu 🎂</button>
  <label>Süre (saniye): <input type="number" id="timeInput" value="60" min="10" max="300"></label>
</div>

<div id="gameUI">
  <p id="task"></p>
  <p>Skor: <span id="score">0</span> | Kalan Süre: <span id="timeLeft">0</span>s</p>
  <canvas id="c" width="400" height="400"></canvas>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let slices = 8;
let selected = [];
let target = {num:0, den:1};
let score = 0;
let mode = "pizza";
let shakeTime = 0;
let timeLeft = 60;
let timerInterval;

const correctSound = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=success-1-6297.mp3");
const wrongSound = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c0a9e2d04.mp3?filename=error-126627.mp3");

function startGame(selectedMode){
  mode = selectedMode;
  score = 0;
  document.getElementById("score").innerText = score;
  document.getElementById("menu").style.display = "none";
  document.getElementById("gameUI").style.display = "block";
  timeLeft = parseInt(document.getElementById("timeInput").value);
  document.getElementById("timeLeft").innerText = timeLeft;

  timerInterval = setInterval(()=>{
    timeLeft--;
    document.getElementById("timeLeft").innerText = timeLeft;
    if(timeLeft <= 0){
      clearInterval(timerInterval);
      alert('Süre doldu! Skorunuz: ' + score);
      document.getElementById("menu").style.display = "flex";
      document.getElementById("gameUI").style.display = "none";
    }
  },1000);

  newGame();
}

function newGame(){
  slices = [4,6,8,12][Math.floor(Math.random()*4)];
  selected = new Array(slices).fill(false);
  let num = Math.floor(Math.random()*slices)+1;
  target = {num:num, den:slices};
  document.getElementById("task").innerText = `${num}/${slices} kadar dilimi seç`;
}

function draw(){
  ctx.save();

  if(shakeTime > 0){
    ctx.translate(Math.random()*10-5, Math.random()*10-5);
    shakeTime--;
  }

  ctx.clearRect(0,0,400,400);
  let cx=200, cy=200, r=150;

  for(let i=0;i<slices;i++){
    let start = (i/slices)*Math.PI*2;
    let end = ((i+1)/slices)*Math.PI*2;

    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end);
    ctx.closePath();

    if(mode === "pizza"){
      ctx.fillStyle = selected[i] ? "#ff7043" : "#ffcc80";
    } else {
      ctx.fillStyle = selected[i] ? "#f06292" : "#f8bbd0";
    }
    ctx.fill();

    ctx.strokeStyle = "#5d4037";
    ctx.lineWidth = 2;
    ctx.stroke();

    let mid = (start+end)/2;

    if(mode === "pizza"){
      let px = cx + Math.cos(mid)*80;
      let py = cy + Math.sin(mid)*80;
      ctx.beginPath();
      ctx.arc(px, py, 10, 0, Math.PI*2);
      ctx.fillStyle = "#b71c1c";
      ctx.fill();
    }

    if(mode === "cake"){
      let px = cx + Math.cos(mid)*90;
      let py = cy + Math.sin(mid)*90;
      ctx.beginPath();
      ctx.arc(px, py, 8, 0, Math.PI*2);
      ctx.fillStyle = "red";
      ctx.fill();
    }
  }

  ctx.restore();
  requestAnimationFrame(draw);
}

canvas.addEventListener("click", e=>{
  let rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left - 200;
  let y = e.clientY - rect.top - 200;

  let angle = Math.atan2(y,x);
  if(angle < 0) angle += Math.PI*2;

  let index = Math.floor(angle/(Math.PI*2)*slices);
  selected[index] = !selected[index];

  check();
});

function check(){
  let count = selected.filter(v=>v).length;

  if(count === target.num){
    score++;
    correctSound.play();
    document.getElementById("score").innerText = score;
    setTimeout(newGame,600);
  } else if(count > target.num){
    score--;
    wrongSound.play();
    shakeTime = 10;
    document.getElementById("score").innerText = score;
  }
}

draw();
</script>

</body>
</html>
